    <style>
        :root {
            --accent: #00f2ff;
            --accent-bright: #ffffff;
            --bg: #030508;
            --head-color: #0a0e14;
            --danger: #ff5f57;
            --warning: #febc2e;
            --staff: #ff4a4a;
            --margin: 0.5rem;
            --glass: rgba(255, 255, 255, 0.05);
        }
        /* Select deshabilitado */
        select:disabled,
        select.disabled {
            opacity: 0.5;
            background: rgba(255, 0, 0, 0.2);
            border-color: var(--danger);
            color: #ff8888;
            cursor: not-allowed;
        }
        
        /* Para las opciones dentro de un select deshabilitado */
        select:disabled option {
            background: #1a1a1a;
            color: #666;
        }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); overflow: hidden; font-family: 'Segoe UI', monospace; color: white; cursor: none; }

        /* --- ESPACIO DE TRABAJO --- */
        .holographic-workspace { 
            position: relative; width: calc(100vw - (var(--margin) * 2)); height: calc(100vh - (var(--margin) * 2)); 
            margin: var(--margin); display: flex; justify-content: center; align-items: center; border-radius: 15px; overflow: hidden; perspective: 1000px; 
        }

        /* --- DRAGÓN GEOMÉTRICO --- */
        .dragon-head-shell { position: fixed; width: 60px; height: 60px; z-index: 1000; pointer-events: none; transform: translate(-50%, -50%); display: flex; justify-content: center; align-items: center; }
        .dragon-head-geometry { position: relative; width: 30px; height: 45px; background: var(--head-color); clip-path: polygon(50% 0%, 90% 20%, 100% 50%, 80% 90%, 50% 100%, 20% 90%, 0% 50%, 10% 20%); border: 1px solid rgba(255,255,255,0.1); }
        .dragon-horn { position: absolute; width: 8px; height: 25px; background: linear-gradient(to bottom, var(--accent) 0%, var(--head-color) 100%); top: -15px; clip-path: polygon(50% 0%, 100% 100%, 0% 100%); }
        .dragon-horn.left { left: 0; transform: rotate(-20deg); }
        .dragon-horn.right { right: 0; transform: rotate(20deg); }
        .dragon-eye { position: absolute; width: 6px; height: 8px; background: var(--accent-bright); top: 18px; clip-path: polygon(0% 20%, 100% 0%, 80% 100%, 20% 80%); box-shadow: 0 0 10px var(--accent-bright); animation: eye-blink 4s infinite; }
        .dragon-eye.left { left: 5px; } .dragon-eye.right { right: 5px; transform: scaleX(-1); }
        .dragon-segment { position: fixed; pointer-events: none; z-index: 999; border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 15px var(--accent); will-change: transform; }
        @keyframes eye-blink { 0%, 90%, 100% { transform: scaleY(1); } 95% { transform: scaleY(0.1); } }

        /* --- INTERFAZ NEO-SHELL --- */
        .neo-shell { 
            position: relative; width: 100%; max-width: 1250px; height: 95%; 
            background: rgba(8, 12, 20, 0.95); backdrop-filter: blur(25px); 
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; 
            display: flex; flex-direction: column; box-shadow: 0 40px 100px rgba(0,0,0,0.8); z-index: 10; 
        }

        .system-header { padding: 15px 25px; border-bottom: 1px solid rgba(255,255,255,0.08); display: flex; justify-content: space-between; align-items: center; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        
        .status-pill { font-size: 10px; padding: 4px 12px; border-radius: 20px; text-transform: uppercase; font-weight: bold; border: 1px solid; }
        .status-pill.public { color: var(--accent); border-color: var(--accent); }
        .status-pill.register { color: var(--warning); border-color: var(--warning); }
        .status-pill.blocked { color: red; border-color: red }
        .status-pill.private { color: var(--staff); border-color: var(--staff); box-shadow: 0 0 10px rgba(255, 74, 74, 0.2); }

        .iframe-controls { display: flex; gap: 15px; background: rgba(0,0,0,0.3); padding: 10px 20px; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .control-group { display: flex; align-items: center; gap: 8px; font-size: 10px; color: #555; font-weight: bold; }
        .select-mini { background: #000; color: var(--accent); border: 1px solid #333; font-size: 10px; padding: 3px 6px; border-radius: 4px; outline: none; cursor: pointer; }

        .main-content { flex: 1; display: flex; flex-direction: column; padding: 15px; gap: 10px; overflow: hidden; }
        
        #viewport { flex: 1; background: #05070a; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); position: relative; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }

        /* --- NAVEGACIÓN --- */
        .nav-zone { display: flex; flex-direction: column; gap: 8px; margin-top: 5px; }
        .row-wrapper { width: 100%; overflow-x: auto; white-space: nowrap; padding-bottom: 8px; display: flex; gap: 10px; }
        .row-wrapper::-webkit-scrollbar { height: 4px; }
        .row-wrapper::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        .btn {
            background: var(--glass); border: 1px solid rgba(0, 242, 255, 0.2);
            color: var(--accent); padding: 8px 18px; border-radius: 30px;
            font-size: 9px; font-weight: bold; cursor: pointer; transition: all 0.3s ease;
            text-transform: uppercase; letter-spacing: 1px; flex-shrink: 0;
        }
        .btn:hover { background: rgba(0, 242, 255, 0.1); border-color: var(--accent); transform: translateY(-1px); }
        .btn.active { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent); }

        /* --- AUTH --- */
        .auth-overlay { position: absolute; inset: 0; background: #05070a; display: flex; align-items: center; justify-content: center; z-index: 100; }
        .login-box { padding: 30px; border: 1px solid var(--accent); border-radius: 20px; background: rgba(0,0,0,0.8); text-align: center; width: 320px; }
        .auth-methods { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .auth-methods input { background: rgba(255,255,255,0.05); border: 1px solid #333; padding: 12px; color: white; border-radius: 5px; outline: none; }
        .error-box {  padding: 30px;  border: 1px solid var(--danger);  border-radius: 20px;  background: rgba(0,0,0,0.8);   text-align: center;  width: 320px; }
        .btn-logout { background: rgba(255, 95, 87, 0.1); border: 1px solid var(--danger); color: var(--danger); font-size: 9px; padding: 6px 15px; border-radius: 0 0 10px 10px; cursor: pointer; align-self: center; }

        @media (max-width: 768px) { body { cursor: auto; } }
        /* --- BOTÓN INFO Y MODAL --- */
        .info-trigger {
            margin-left: 8px;
            cursor: pointer;
            opacity: 0.6;
            transition: 0.3s;
            font-size: 1.1em;
        }
        .info-trigger:hover { opacity: 1; color: var(--accent); }
        
        .desc-overlay {
            position: absolute;
            inset: 0;
            background: rgba(3, 5, 8, 0.9);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }
        
        .desc-card {
            background: var(--head-color);  border: 1px solid var(--accent);  padding: 25px; border-radius: 15px; max-width: 400px; text-align: center; box-shadow: 0 0 30px rgba(0, 242, 255, 0.1);
        }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>

<script>
    // ==================== METADATA CONFIGURATION ====================
    // Mapa de logos por categoría (puedes agregar más)
    const LOGO_MAP = {
        default: "https://raw.githubusercontent.com/Grouvex/grouvex.github.io/refs/heads/main/img/Grouvex1.png",
        "GSRecords": "https://raw.githubusercontent.com/Grouvex/grouvex.github.io/refs/heads/main/img/GSRecords.png",
        "GSDesigns": "https://raw.githubusercontent.com/Grouvex/grouvex.github.io/refs/heads/main/img/GSDesigns.png",
        "Grouvex": "https://raw.githubusercontent.com/Grouvex/grouvex.github.io/refs/heads/main/img/Grouvex.png"
    };
    
    // Función genérica para actualizar metadatos (title, favicon, OG tags)
    function updateMetadata(title, description, imageUrl, urlPath) {
        // Actualizar título de la página
        document.title = title;
        
        // Actualizar meta tags Open Graph
        let ogTitle = document.querySelector('meta[property="og:title"]');
        if (!ogTitle) {
            ogTitle = document.createElement('meta');
            ogTitle.setAttribute('property', 'og:title');
            document.head.appendChild(ogTitle);
        }
        ogTitle.setAttribute('content', title);
        
        let ogDesc = document.querySelector('meta[property="og:description"]');
        if (!ogDesc) {
            ogDesc = document.createElement('meta');
            ogDesc.setAttribute('property', 'og:description');
            document.head.appendChild(ogDesc);
        }
        ogDesc.setAttribute('content', description);
        
        let ogImg = document.querySelector('meta[property="og:image"]');
        if (!ogImg) {
            ogImg = document.createElement('meta');
            ogImg.setAttribute('property', 'og:image');
            document.head.appendChild(ogImg);
        }
        ogImg.setAttribute('content', imageUrl);
        
        let ogUrl = document.querySelector('meta[property="og:url"]');
        if (!ogUrl) {
            ogUrl = document.createElement('meta');
            ogUrl.setAttribute('property', 'og:url');
            document.head.appendChild(ogUrl);
        }
        ogUrl.setAttribute('content', `https://grouvex.github.io${urlPath || '/calendars'}`);
        
        // Actualizar Twitter Card
        let twitterTitle = document.querySelector('meta[name="twitter:title"]');
        if (!twitterTitle) {
            twitterTitle = document.createElement('meta');
            twitterTitle.setAttribute('name', 'twitter:title');
            document.head.appendChild(twitterTitle);
        }
        twitterTitle.setAttribute('content', title);
        
        let twitterDesc = document.querySelector('meta[name="twitter:description"]');
        if (!twitterDesc) {
            twitterDesc = document.createElement('meta');
            twitterDesc.setAttribute('name', 'twitter:description');
            document.head.appendChild(twitterDesc);
        }
        twitterDesc.setAttribute('content', description);
        
        let twitterImg = document.querySelector('meta[name="twitter:image"]');
        if (!twitterImg) {
            twitterImg = document.createElement('meta');
            twitterImg.setAttribute('name', 'twitter:image');
            document.head.appendChild(twitterImg);
        }
        twitterImg.setAttribute('content', imageUrl);
        
        // Actualizar favicon (link rel="icon")
        let favicon = document.querySelector('link[rel="icon"]');
        if (!favicon) {
            favicon = document.createElement('link');
            favicon.setAttribute('rel', 'icon');
            document.head.appendChild(favicon);
        }
        favicon.setAttribute('href', imageUrl);
        
        // Opcional: Actualizar también apple-touch-icon
        let appleIcon = document.querySelector('link[rel="apple-touch-icon"]');
        if (!appleIcon) {
            appleIcon = document.createElement('link');
            appleIcon.setAttribute('rel', 'apple-touch-icon');

    let userSession = null;
    let currentConfig = null;

    function init() {
        const mainNav = document.getElementById('main-nav');
        DATA.forEach((cat, index) => {
            const container = document.createElement('div');
            container.style.display = 'inline-flex';
            container.style.alignItems = 'center';
    
            const b = document.createElement('button');
            b.className = 'btn';
            b.innerText = cat.label;
            b.onclick = () => selectMain(cat, b);
            
            // Icono de información
            const info = document.createElement('span');
            info.className = 'info-trigger';
            info.innerHTML = 'ℹ️';
            info.onclick = (e) => { e.stopPropagation(); showDesc(cat.desc || "Sin descripción disponible."); };
    
            container.appendChild(b);
            container.appendChild(info);
            mainNav.appendChild(container);
            
            if(index === 0) selectMain(cat, b);
        });
    
        auth.onAuthStateChanged(user => {
            userSession = user;
            document.getElementById('logout-zone').style.display = user ? 'flex' : 'none';
            if (currentConfig) loadView(currentConfig);
        });
    }

    function selectMain(cat, element) {
        document.querySelectorAll('#main-nav .btn').forEach(b => b.classList.remove('active'));
        element.classList.add('active');
        renderSubs(cat);
        loadView(cat);
    }

    function renderSubs(cat) {
        const subNav = document.getElementById('sub-nav');
        if (cat.subs && cat.subs.length > 0) {
            subNav.style.display = 'flex';
            subNav.innerHTML = '';
            cat.subs.forEach(sub => {
                const container = document.createElement('div');
                container.style.display = 'inline-flex';
                container.style.alignItems = 'center';
                container.style.marginRight = '15px';
    
                const sb = document.createElement('button');
                sb.className = 'btn';
                sb.innerText = sub.label;
                sb.onclick = () => {
                    document.querySelectorAll('#sub-nav .btn').forEach(b => b.classList.remove('active'));
                    sb.classList.add('active');
                    loadView(sub);
                };
    
                const info = document.createElement('span');
                info.className = 'info-trigger';
                info.innerHTML = 'ℹ️';
                info.onclick = (e) => { e.stopPropagation(); showDesc(sub.desc || "Sin descripción disponible."); };
    
                container.appendChild(sb);
                container.appendChild(info);
                subNav.appendChild(container);
            });
        } else { subNav.style.display = 'none'; }
    }
    
    function showDesc(text) {
        document.getElementById('desc-content').innerText = text;
        document.getElementById('desc-modal').style.display = 'flex';
    }

    function loadView(config) {
        currentConfig = config;
        const container = document.getElementById('iframe-container');
        const authScreen = document.getElementById('auth-screen');
        const errorScreen = document.getElementById('error-screen');
        const blockedScreen = document.getElementById('blocked-screen');
        const indicator = document.getElementById('access-indicator');
        const buttonLang = document.getElementById('lang-select');
        const buttonTZone = document.getElementById('tz-select');
        
        document.getElementById('current-title').innerText = config.label.toUpperCase();
        
        // Actualizar logo del header
        const headerLogo = document.getElementById('header-logo');
        if (headerLogo) {
            headerLogo.src = getLogoForLabel(config.label);
        }
        
        // Actualizar metadatos de la página
        const pageTitle = `${config.label} | Grouvex Studios`;
        const pageDesc = config.desc || "Calendario oficial de Grouvex Studios";
        const pageImage = getLogoForLabel(config.label);
        const pageUrl = `/calendar/${encodeURIComponent(config.label.replace(/[^a-zA-Z0-9]/g, '_'))}`;
        updateMetadata(pageTitle, pageDesc, pageImage, pageUrl);
        
        // Reset pantallas
        authScreen.style.display = 'none';
        errorScreen.style.display = 'none';
        blockedScreen.style.display = 'none';
        container.innerHTML = '';

        // Definir indicador visual
        if (!config.private) {
            indicator.innerText = "PÚBLICO";
            indicator.className = "status-pill public";
        } else if (config.allowed.includes("register")) {
            indicator.innerText = "REGISTRO";
            indicator.className = "status-pill register";
        } else if (config.allowed.includes("blocked")) {
            indicator.innerText = "BLOCKED";
            indicator.className = "status-pill blocked";
        } else {
            indicator.innerText = "PRIVADO";
            indicator.className = "status-pill private";
        }

        // 1. PRIMERO: ¿Está bloqueado? (Máxima prioridad)
        if (config.allowed.includes("blocked")) {
            blockedScreen.style.display = 'flex';
            buttonLang.disabled = true;
            buttonTZone.disabled = true;
            return;
        }
        
        // 2. SEGUNDO: Si es público, mostrar sin autenticación
        if (!config.private) {
            updateIframeParams();
            buttonLang.disabled = false;
            buttonTZone.disabled = false;
            return;
        }
    
        // 3. TERCERO: Si es privado, requiere autenticación
        if (!userSession) {
            authScreen.style.display = 'flex';
            buttonLang.disabled = false;
            buttonTZone.disabled = false;
            return;
        }
    
        // 4. CUARTO: Validación de correos específicos o registro
        const userEmail = userSession.email;
        const isRegisteredOnly = config.allowed.includes("register");
        const hasSpecificEmails = config.allowed.some(item => item.includes("@"));
    
        if (isRegisteredOnly) {
            updateIframeParams();
        } else if (hasSpecificEmails) {
            if (config.allowed.includes(userEmail)) {
                updateIframeParams();
            } else {
                errorScreen.style.display = 'flex';
            }
        } else {
            errorScreen.style.display = 'flex';
        }
    }

    function updateIframeParams() {
      if (!currentConfig) return;
      let baseUrl = currentConfig.url;
      baseUrl = baseUrl.replace(/[?&]ctz=[^&]*/, '');
      baseUrl = baseUrl.replace(/[?&]hl=[^&]*/, '');
    
      const tz = document.getElementById('tz-select').value;
      const lang = document.getElementById('lang-select').value;
      const separator = baseUrl.includes('?') ? '&' : '?';
      const finalUrl = `${baseUrl}${separator}ctz=${encodeURIComponent(tz)}&hl=${lang}&bgcolor=%23030508`;
    
      const container = document.getElementById('iframe-container');
      container.innerHTML = `<iframe src="${finalUrl}" loading="lazy"></iframe>`;
    }

    window.loginGoogle = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
    window.loginEmail = () => auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('pass').value).catch(e => alert(e.message));
    function handleLogout() { auth.signOut().then(() => location.reload()); }

    // --- DRAGÓN ---
    const numSegments = 13;
    const segments = [];
    const coords = { x: 0, y: 0 };

    for (let i = 0; i < numSegments; i++) {
        const div = document.createElement('div');
        div.className = 'dragon-segment';
        const size = 20 - (i * 1.3);
        div.style.width = size + 'px';
        div.style.height = size + 'px';
        div.style.opacity = 1 - (i / numSegments);
        div.style.background = `radial-gradient(circle, hsl(${180 + (i*5)}, 100%, 50%) 0%, transparent 80%)`;
        document.body.appendChild(div);
        segments.push({ x: 0, y: 0, element: div });
    }

    window.addEventListener('mousemove', e => {
        coords.x = e.clientX;
        coords.y = e.clientY;
    });

    function updateDragon() {
        let x = coords.x;
        let y = coords.y;
        const head = document.querySelector('.dragon-head-shell');
        if (head) {
            head.style.left = x + 'px';
            head.style.top = y + 'px';
        }
        segments.forEach((seg) => {
            seg.x += (x - seg.x) * 0.22;
            seg.y += (y - seg.y) * 0.22;
            seg.element.style.left = seg.x + 'px';
            seg.element.style.top = seg.y + 'px';
            x = seg.x; y = seg.y;
        });
        requestAnimationFrame(updateDragon);
    }

    init();
    updateDragon();
</script>
