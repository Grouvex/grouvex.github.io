    <style>
      /* Variables CSS */
      :root {
        --primary-color: #667eea;
        --secondary-color: #764ba2;
        --accent-color: #ff6b6b;
        --bg-dark: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
        --bg-light: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        --text-light: #ffffff;
        --text-dark: #2d3748;
        --glass-bg: rgba(255, 255, 255, 0.1);
        --glass-border: rgba(255, 255, 255, 0.2);
        --card-bg: rgba(255, 255, 255, 0.08);
        --shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      }
  
      .grouvex-music-player {
        background: var(--bg-dark);
        color: var(--text-light);
        border-radius: 24px;
        padding: 0;
        box-shadow: var(--shadow);
        max-width: 80%;
        margin: 10px auto;
        overflow: hidden;
        position: relative;
        backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
      }
  
      .grouvex-music-player.light-theme {
        background: var(--bg-light);
        color: var(--text-dark);
      }
  
      .gmx-player-header {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px 24px 20px;
        text-align: center;
        gap: 20px;
      }
  
      .gmx-player-header a {
        display: inline-block;
        line-height: 0;
        width: auto;
        max-width: 200px;
      }
  
      .gmx-player-header img {
        width: 100%;
        max-width: 180px;
        height: auto;
        display: block;
        margin: 0 auto;
      }
  
      .gmx-player-header h1 {
        margin: 0;
        font-size: clamp(1rem, 5vw, 1.5rem);
        word-break: keep-all;
      }
  
      .gmx-theme-toggle {
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        color: inherit;
        padding: 10px 16px;
        border-radius: 50px;
        cursor: pointer;
        transition: var(--transition);
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 8px;
      }
  
      .gmx-theme-toggle:hover {
        transform: translateY(-2px);
        background: rgba(255, 255, 255, 0.2);
      }
  
      .gmx-playlist-container {
        padding: 0 20px;
      }
  
      .gmx-playlist {
        max-height: 220px;
        overflow-y: auto;
        margin-bottom: 20px;
        border-radius: 16px;
        background: var(--glass-bg);
        backdrop-filter: blur(15px);
        border: 1px solid var(--glass-border);
      }
  
      .gmx-playlist::-webkit-scrollbar {
        width: 6px;
      }
  
      .gmx-playlist::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.3);
        border-radius: 3px;
      }
  
      .gmx-playlist-item {
        padding: 16px 20px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        cursor: pointer;
        transition: var(--transition);
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: relative;
      }
  
      .gmx-playlist-item:hover {
        background: rgba(255, 255, 255, 0.1);
        transform: translateX(8px);
      }
  
      .gmx-playlist-item.active {
        background: rgba(255, 255, 255, 0.2);
        border-left: 4px solid var(--primary-color);
      }
  
      .gmx-playlist-item.disabled {
        opacity: 0.5;
        cursor: not-allowed;
        background: rgba(255, 255, 255, 0.05);
      }
  
      .gmx-playlist-item.disabled:hover {
        transform: none;
        background: rgba(255, 255, 255, 0.05);
      }
  
      .gmx-song-title {
        flex: 1;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        position: relative;
      }
  
      .gmx-song-title:hover::after {
        content: attr(data-full-title);
        position: absolute;
        top: -40px;
        left: 0;
        background: rgba(0, 0, 0, 0.8);
        color: white;
        padding: 8px 12px;
        border-radius: 8px;
        white-space: nowrap;
        z-index: 10;
        font-size: 0.9em;
      }
  
      .gmx-song-duration {
        font-size: 0.75em;
        opacity: 0.7;
        margin-left: 10px;
      }
  
      .gmx-player-controls {
        background: var(--glass-bg);
        padding: 24px;
        margin: 0 20px 20px;
        border-radius: 20px;
        backdrop-filter: blur(15px);
        border: 1px solid var(--glass-border);
      }
  
      .gmx-song-info {
        text-align: center;
        margin-bottom: 20px;
      }
  
      .gmx-song-title-large {
        font-size: 1.3em;
        font-weight: 700;
        margin-bottom: 8px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
  
      .gmx-song-artist {
        opacity: 0.8;
        font-size: 0.9em;
      }
  
      .gmx-progress-container {
        margin: 20px 0;
      }
  
      .gmx-progress-bar {
        width: 100%;
        height: 8px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 10px;
        cursor: pointer;
        position: relative;
        overflow: hidden;
      }
  
      .gmx-progress {
        height: 100%;
        background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
        border-radius: 10px;
        width: 0%;
        transition: width 0.1s ease;
      }
  
      .gmx-time-display {
        display: flex;
        justify-content: space-between;
        font-size: 0.8em;
        opacity: 0.8;
        margin-top: 8px;
      }
  
      .gmx-control-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 20px;
        margin: 24px 0;
      }
  
      .gmx-control-btn {
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        color: inherit;
        font-size: 1.4em;
        cursor: pointer;
        padding: 14px;
        border-radius: 50%;
        transition: var(--transition);
        display: flex;
        align-items: center;
        justify-content: center;
        width: 50px;
        height: 50px;
      }
  
      .gmx-control-btn:hover {
        transform: translateY(-3px) scale(1.1);
        background: rgba(255, 255, 255, 0.2);
      }
  
      .gmx-play-pause {
        background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
        width: 60px;
        height: 60px;
        font-size: 1.8em;
        border: none;
        box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
      }
  
      .gmx-play-pause:hover {
        transform: translateY(-3px) scale(1.1);
        box-shadow: 0 12px 35px rgba(102, 126, 234, 0.6);
      }
  
      .gmx-volume-control {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-top: 16px;
        padding: 12px 16px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 50px;
      }
  
      .gmx-volume-slider {
        flex: 1;
        height: 6px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 10px;
        outline: none;
        -webkit-appearance: none;
        appearance: none;
      }
  
      .gmx-volume-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: var(--primary-color);
        cursor: pointer;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        transition: var(--transition);
      }
  
      .gmx-volume-slider::-webkit-slider-thumb:hover {
        transform: scale(1.2);
        background: var(--secondary-color);
      }
  
      .gmx-volume-value {
        font-size: 0.8em;
        font-weight: 600;
        min-width: 40px;
        text-align: center;
      }
  
      .gmx-additional-controls {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-top: 20px;
      }
  
      .gmx-additional-btn {
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        color: inherit;
        padding: 10px 20px;
        border-radius: 50px;
        cursor: pointer;
        transition: var(--transition);
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 8px;
      }
  
      .gmx-additional-btn.active {
        background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
        border-color: transparent;
      }
  
      .gmx-additional-btn.disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
  
      .gmx-additional-btn.disabled:hover {
        transform: none;
        background: var(--glass-bg);
      }
  
      .gmx-config-panel {
        background: var(--glass-bg);
        margin: 0 20px 20px;
        border-radius: 20px;
        backdrop-filter: blur(15px);
        border: 1px solid var(--glass-border);
        overflow: hidden;
      }
  
      .gmx-config-toggle {
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        color: inherit;
        padding: 12px 20px;
        border-radius: 50px;
        cursor: pointer;
        width: calc(100% - 40px);
        text-align: center;
        margin: 0 20px 20px;
        transition: var(--transition);
        font-weight: 600;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
  
      .gmx-config-toggle::before {
        content: "⚙️";
      }
  
      .gmx-config-toggle:hover {
        transform: translateY(-2px);
        background: rgba(255, 255, 255, 0.2);
      }
  
      .gmx-config-content {
        display: none;
        padding: 20px;
      }
  
      .gmx-config-content.show {
        display: block;
      }
  
      .gmx-config-item {
        margin: 16px 0;
      }
  
      .gmx-config-label {
        display: flex;
        align-items: center;
        gap: 12px;
        font-weight: 600;
        cursor: pointer;
      }
  
      .gmx-visualizer {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 3px;
        height: 40px;
        margin: 15px 0;
        padding: 0 20px;
      }
  
      .gmx-bar {
        width: 4px;
        height: 20px;
        background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
        border-radius: 2px;
        animation: equalizer 1.5s ease-in-out infinite;
        animation-play-state: paused;
      }
  
      .gmx-bar:nth-child(1) { animation-delay: 0.1s; }
      .gmx-bar:nth-child(2) { animation-delay: 0.2s; }
      .gmx-bar:nth-child(3) { animation-delay: 0.3s; }
      .gmx-bar:nth-child(4) { animation-delay: 0.4s; }
      .gmx-bar:nth-child(5) { animation-delay: 0.5s; }
  
      @keyframes equalizer {
        0%, 100% { height: 10px; }
        50% { height: 30px; }
      }
  
      .gmx-help-section {
        margin: 0 20px 20px;
      }
  
      .gmx-help-toggle {
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        color: inherit;
        padding: 12px 20px;
        border-radius: 50px;
        cursor: pointer;
        width: 100%;
        text-align: center;
        transition: var(--transition);
        font-weight: 600;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
  
      .gmx-help-toggle::before {
        content: "❓";
      }
  
      .gmx-help-toggle:hover {
        transform: translateY(-2px);
        background: rgba(255, 255, 255, 0.2);
      }
  
      .gmx-help-content {
        display: none;
        padding: 20px;
        background: var(--card-bg);
        border-radius: 16px;
        margin-top: 10px;
      }
  
      .gmx-help-content.show {
        display: block;
      }
  
      .gmx-help-item {
        margin-bottom: 16px;
      }
  
      .gmx-help-item h4 {
        margin-bottom: 8px;
        color: var(--primary-color);
      }
  
      .gmx-help-item p {
        font-size: 0.9em;
        line-height: 1.5;
      }
  
      .gmx-loop-indicator {
        font-size: 0.7em;
        margin-left: 5px;
        background: rgba(255, 255, 255, 0.2);
        padding: 2px 6px;
        border-radius: 10px;
      }
  
      .song-info-container {
        background: var(--glass-bg);
        margin: 0 20px 20px;
        padding: 0;
        border-radius: 20px;
        backdrop-filter: blur(15px);
        border: 1px solid var(--glass-border);
        overflow: hidden;
        display: none;
      }
  
      .song-info-container.show {
        display: block;
      }
  
      .song-illustration {
        width: 100%;
        max-height: 200px;
        object-fit: cover;
        border-radius: 20px 20px 0 0;
      }
  
      .song-illustration.placeholder {
        height: 150px;
        background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 3em;
        border-radius: 20px 20px 0 0;
      }
  
      .song-details-content {
        padding: 20px;
      }
  
      .song-album-title {
        font-size: 1.2em;
        font-weight: 700;
        margin-bottom: 8px;
        color: var(--primary-color);
      }
  
      .song-artist-info {
        font-size: 1em;
        margin-bottom: 5px;
        opacity: 0.9;
      }
  
      .song-other-artists {
        font-size: 0.9em;
        margin-bottom: 10px;
        opacity: 0.8;
        font-style: italic;
      }
  
      .song-genres {
        display: flex;
        gap: 10px;
        margin-bottom: 10px;
        flex-wrap: wrap;
      }
  
      .genre-tag {
        background: rgba(76, 129, 222, 0.8);
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 0.8em;
        border: 1px solid var(--glass-border);
      }
  
      .song-details-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 15px;
        background: rgba(0, 0, 0, 0.3);
        border-radius: 12px;
        padding: 10px;
      }
      
      .song-details-grid hr {
        grid-column: 1 / -1;
        margin: 5px 0;
        border: none;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--primary-color), var(--secondary-color), transparent);
      }
      
      .song-details-grid br {
        display: none;
      }
  
      .detail-item {
        font-size: 0.8em;
        opacity: 0.9;
      }
  
      .detail-label {
        font-weight: 600;
        color: var(--primary-color);
        margin-bottom: 2px;
      }
  
      .song-platforms {
        margin-top: 15px;
        padding-top: 15px;
        border-top: 1px solid var(--glass-border);
      }
  
      .platforms-label {
        font-size: 0.9em;
        font-weight: 600;
        margin-bottom: 5px;
        color: var(--primary-color);
      }
  
      .gmx-platforms-section {
        margin-top: 20px;
        padding: 15px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        border: 1px solid var(--glass-border);
      }
  
      .gmx-platforms-title {
        font-size: 0.9em;
        font-weight: 600;
        margin-bottom: 12px;
        color: var(--primary-color);
        display: flex;
        align-items: center;
        gap: 8px;
      }
  
      .gmx-platforms-links {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }
  
      .gmx-platform-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 16px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 50px;
        text-decoration: none;
        color: inherit;
        font-size: 0.85em;
        transition: var(--transition);
        border: 1px solid var(--glass-border);
      }
  
      .gmx-platform-link:hover {
        transform: translateY(-2px);
        background: rgba(255, 255, 255, 0.2);
      }
  
      .gmx-platform-link.spotify { background: #1DB954; color: white; border-color: #1DB954; }
      .gmx-platform-link.youtube { background: #FF0000; color: white; border-color: #FF0000; }
      .gmx-platform-link.apple { background: #000; color: white; border-color: #333; }
      .gmx-platform-link.amazon { background: #FF9900; color: white; border-color: #FF9900; }
      .gmx-platform-link.deezer { background: #A238FF; color: white; border-color: #A238FF; }
      .gmx-platform-link.tidal { background: #000000; color: white; border-color: #333; }
      .gmx-platform-link.soundcloud { background: #FF5500; color: white; border-color: #FF5500; }
      .gmx-platform-link.tiktok { background: linear-gradient(45deg, black, blue); color: white; border-color: black; }
      .gmx-platform-link.instagram { background: linear-gradient(45deg, pink, magenta, cyan); color: white; border-color: magenta; }
      .gmx-platform-link i { font-size: 1.1em; }
  
      .gmx-playlist-toggle {
          background: var(--glass-bg);
          border: 1px solid var(--glass-border);
          color: inherit;
          padding: 10px 16px;
          border-radius: 50px;
          cursor: pointer;
          font-weight: 600;
          transition: var(--transition);
          display: flex;
          gap: 8px;
      }
  
      .gmx-playlist-toggle:hover {
        transform: translateY(-2px);
        background: rgba(255, 255, 255, 0.2);
      }
  
      .gmx-playlist-container {
        transition: all 0.3s ease;
        overflow: hidden;
      }
  
      .gmx-playlist-container:not(.show) {
        display: none;
      }
  
      .gmx-playlist-container.show {
        display: block;
      }
      
      .gmx-embed-player {
        margin-top: 20px;
        padding: 15px;
        background: rgba(0, 0, 0, 0.3);
        border-radius: 16px;
        border: 1px solid var(--glass-border);
      }
      
      .gmx-embed-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        font-size: 0.85em;
        color: var(--primary-color);
      }
      
      .gmx-embed-close-btn {
        background: none;
        border: none;
        color: inherit;
        cursor: pointer;
        font-size: 1.2em;
        padding: 4px 8px;
        border-radius: 8px;
        transition: var(--transition);
      }
      
      .gmx-embed-close-btn:hover {
        background: rgba(255, 255, 255, 0.2);
      }
  
      .gmx-badge {
        font-size: 0.7em;
        padding: 3px 8px;
        border-radius: 20px;
        font-weight: 600;
        white-space: nowrap;
      }
      .upcoming-badge { background: linear-gradient(135deg, #ff6b6b, #ee5a24); color: white; }
      .preview-badge { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; }
      .gmx-song-info-wrapper {
        flex: 1;
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }
    @keyframes randomMove {
      0% { background-position: 0% 0%; }
      17% { background-position: 80% 20%; }
      34% { background-position: 20% 90%; }
      51% { background-position: 100% 50%; }
      68% { background-position: 0% 80%; }

    if (gmxAllMusicFiles.length) { await updatePlaylistWithDynamicState(); setupEvents(); }
    else document.getElementById('gmxCurrentSongTitle').innerText = 'No hay canciones disponibles';
  }
  init();
  
  window.gmxTogglePlaylist = gmxTogglePlaylist; window.gmxToggleTheme = gmxToggleTheme; window.gmxPreviousSong = gmxPreviousSong;
  window.gmxTogglePlay = gmxTogglePlay; window.gmxNextSong = gmxNextSong; window.gmxSetVolume = gmxSetVolume;
  window.gmxToggleShuffle = gmxToggleShuffle; window.gmxToggleLoop = gmxToggleLoop; window.gmxToggleVisualizer = gmxToggleVisualizer;
  window.gmxCloseEmbed = gmxCloseEmbed;
</script>
