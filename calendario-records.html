<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grouvex Studios - Dragon Calendar</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
        :root {
            --accent: #00f2ff;
            --accent-bright: #ffffff;
            --bg: #030508;
            --head-color: #0a0e14;
            --margin: 0.5rem;
        }

        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); overflow: hidden; font-family: 'Segoe UI', monospace; cursor: none; }

        .holographic-workspace { position: relative; width: calc(100vw - (var(--margin) * 2)); height: calc(100vh - (var(--margin) * 2)); margin: var(--margin); display: flex; justify-content: center; align-items: center; border-radius: 15px; overflow: hidden;perspective: 1000px;
        }

        /* --- FONDO --- */
        .space-background { position: absolute; inset: 0; z-index: -1; }
        .nebula-1 { position: absolute; width: 60%; height: 60%; background: radial-gradient(circle, #1e3a8a 0%, transparent 70%); top: -10%; left: -10%; opacity: 0.3; filter: blur(60px); }
        .nebula-2 { position: absolute; width: 50%; height: 50%; background: radial-gradient(circle, #581c87 0%, transparent 70%); bottom: -10%; right: -5%; opacity: 0.2; filter: blur(60px); }

        /* --- DRAGÓN --- */
        .dragon-head-shell { position: fixed; width: 60px; height: 60px; z-index: 1000; pointer-events: none; transform: translate(-50%, -50%); display: flex; justify-content: center; align-items: center; }
        .dragon-head-geometry { position: relative; width: 30px; height: 45px; background: var(--head-color); clip-path: polygon(50% 0%, 90% 20%, 100% 50%, 80% 90%, 50% 100%, 20% 90%, 0% 50%, 10% 20%); border: 1px solid rgba(255,255,255,0.1);
        }
        .dragon-horn { position: absolute; width: 8px; height: 25px; background: linear-gradient(to bottom, var(--accent) 0%, var(--head-color) 100%); top: -15px; clip-path: polygon(50% 0%, 100% 100%, 0% 100%); }
        .dragon-horn.left { left: 0; transform: rotate(-20deg); }
        .dragon-horn.right { right: 0; transform: rotate(20deg); }
        .dragon-eye { position: absolute; width: 6px; height: 8px; background: var(--accent-bright); top: 18px; clip-path: polygon(0% 20%, 100% 0%, 80% 100%, 20% 80%); box-shadow: 0 0 10px var(--accent-bright); animation: eye-blink 4s infinite; }
        .dragon-eye.left { left: 5px; } .dragon-eye.right { right: 5px; transform: scaleX(-1); }
        .dragon-segment { position: fixed; pointer-events: none; z-index: 999; border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 15px var(--accent); will-change: transform; }

        @keyframes eye-blink { 0%, 90%, 100% { transform: scaleY(1); } 95% { transform: scaleY(0.1); } }

        /* --- INTERFAZ --- */
        .neo-shell { position: relative; width: 100%; max-width: 1250px; height: 95%; background: rgba(8, 12, 20, 0.92); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; display: flex; flex-direction: column;box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        .system-header { padding: 0.8rem 1.2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.08); background: rgba(0,0,0,0.2); }
        .header-left-block { display: flex; align-items: center; gap: 15px; }
        .window-controls { display: flex; gap: 7px; }
        .dot { width: 11px; height: 11px; border-radius: 50%; }
        .close { background: #ff5f57; } .min { background: #febc2e; } .max { background: #28c840; }
        .divider { width: 1px; height: 20px; background: rgba(255,255,255,0.1); }
        .system-logo-img { height: 26px; filter: drop-shadow(0 0 8px var(--accent)); }
        .system-title { display: flex; flex-direction: column; line-height: 1.1; }
        .title-text { font-size: 9px; letter-spacing: 2px; color: #555; font-weight: 800; }
        .live-indicator { display: flex; align-items: center; gap: 5px; color: var(--accent); font-size: 10px; font-weight: bold; }
        .pulse { width: 5px; height: 5px; background: var(--accent); border-radius: 50%; animation: p 1.5s infinite; }
        @keyframes p { 0% { box-shadow: 0 0 0 0 rgba(0,242,255,0.7); } 100% { box-shadow: 0 0 0 8px transparent; } }

        /* --- CONTENEDOR PRINCIPAL --- */
        .main-content { padding: 1rem; flex: 1; display: flex; flex-direction: column; overflow: hidden; gap: 1rem; }
        .calendar-wrapper {
            position: relative; flex: 1; border-radius: 12px;
            background: #05070a; border: 1px solid rgba(255, 255, 255, 0.05); overflow: auto;  display: flex; flex-direction: column;
        }

        /* Personalización del scrollbar para que no rompa la estética Dark */
        .calendar-wrapper::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .calendar-wrapper::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }

        .calendar-wrapper::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
            box-shadow: 0 0 10px var(--accent);
        }

        /* Forzar que el iframe ocupe todo el espacio y gestione su propio scroll si es necesario */
        .google-iframe {
            width: 100%;
            height: 100%;
            border: none;
            flex: 1;
            /* Algunos navegadores necesitan esto para respetar el border-radius del padre */
            mask-image: radial-gradient(white, black); 
            -webkit-mask-image: -webkit-radial-gradient(white, black);
        }

        /* 1. Tamaño de la barra (Vertical y Horizontal) */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px; 
        }

        /* 2. El fondo de la barra (Track) */
        ::-webkit-scrollbar-track {
            background: rgba(8, 12, 20, 0.5); 
            border-radius: 10px;
        }

        /* 3. La parte que se mueve (Thumb/Pestaña) */
        ::-webkit-scrollbar-thumb {
            background: rgba(0, 242, 255, 0.3);
            border-radius: 10px;
            border: 1px solid rgba(0, 242, 255, 0.1);
            box-shadow: inset 0 0 5px rgba(0, 242, 255, 0.2);
            transition: all 0.3s ease;
        }

        /* 4. Efecto cuando pasas el ratón por encima */
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
            box-shadow: 0 0 15px var(--accent); 
        }

        /* 5. Esquina donde se juntan ambas barras */
        ::-webkit-scrollbar-corner {
            background: transparent;
        }

        /* Firefox (Soporte limitado para personalización) */
        * {
            scrollbar-width: thin;
            scrollbar-color: var(--accent) transparent;
        }
                .glass-reflection { position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 40%); pointer-events: none; z-index: 2; }

                /* --- BOTONES --- */
                .system-shortcuts { display: flex; gap: 10px; padding: 10px 15px; justify-content: flex-start;
            overflow-x: auto; overflow-y: hidden; white-space: nowrap; -webkit-overflow-scrolling: touch;
        }

        .btn-shortcut {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(0, 242, 255, 0.2);
            color: var(--accent); padding: 10px 20px; border-radius: 30px;
            text-decoration: none; font-size: 8px;font-weight: bold; letter-spacing: 1px;
            transition: all 0.3s ease; text-transform: uppercase; backdrop-filter: blur(10px);
            display: flex; align-items: center; gap: 8px;
        }

        .btn-shortcut:hover {
            background: rgba(0, 242, 255, 0.1); border-color: var(--accent);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3); transform: translateY(-2px); color: white;
        }

        .btn-shortcut::before { content: '>'; font-family: monospace; opacity: 0.5; }

        /* --- AUTH CARD --- */
        .auth-card { max-width: 400px; margin: auto; padding: 40px; background: rgba(255,255,255,0.03); border: 1px solid var(--accent); border-radius: 15px; text-align: center; color: white; z-index: 5; }
        .auth-card h3 { letter-spacing: 5px; color: var(--accent); }
        .auth-methods { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        .auth-methods input { background: rgba(0,0,0,0.5); border: 1px solid #333; padding: 12px; color: white; border-radius: 5px; font-family: monospace; }
        .btn-auth { padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-family: monospace; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }
        .btn-auth.google { background: white; color: #333; }
        .btn-auth.primary { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent); }
        .divider-text { margin: 15px 0; border-bottom: 1px solid #333; height: 10px; text-align: center; }
        .divider-text span { background: #080c14; padding: 0 10px; font-size: 10px; color: #555; }
        
        .logout-mini { position: block;background: rgba(255, 95, 87, 0.2); border: 1px solid #ff5f57; color: #ff5f57; font-size: 9px; padding: 6px 12px; cursor: pointer; border-radius: 0px 0px 15px 15px; transition: 0.3s; }
        .logout-mini:hover { background: #ff5f57; color: white; }

        .system-footer { padding: 0.8rem 1.5rem; display: flex; justify-content: space-between; font-size: 8px; color: #374151; letter-spacing: 1px; }

        @media (max-width: 768px) {
            .dragon-segment, .dragon-head-shell { display: none !important; }
            body { cursor: auto; }
        }
    </style>
</head>
<body>

<div class="holographic-workspace">
    <div class="space-background">
        <div class="nebula-1"></div>
        <div class="nebula-2"></div>
    </div>

    <div class="dragon-container" id="dragon">
        <div class="dragon-head-shell">
            <div class="dragon-head-geometry">
                <div class="dragon-horn left"></div>
                <div class="dragon-horn right"></div>
                <div class="dragon-eye left"></div>
                <div class="dragon-eye right"></div>
            </div>
        </div>
    </div>

    <div class="neo-shell">
        <nav class="system-header">
            <div class="header-left-block">
                <div class="window-controls">
                    <span class="dot close"></span>
                    <span class="dot min"></span>
                    <span class="dot max"></span>
                </div>
                <div class="divider"></div>
                <a href="https://grouvex.github.io/" class="system-logo-link">
                    <img src="https://raw.githubusercontent.com/Grouvex/grouvex.github.io/refs/heads/main/img/Grouvex1.png" alt="Logo" class="system-logo-img">
                </a>
                <div class="system-title">
                    <div class="live-indicator">
                        <span class="pulse"></span>
                        DRAKO_v7
                    </div>
                    <span class="title-text">Calendario Oficial de GStudios</span>
                </div>
            </div>
            <div class="system-stats">
                <span class="stat" style="color: var(--accent); font-size: 9px;">Version: V.1</span>
            </div>
        </nav>

        <div class="main-content">
            <div class="calendar-wrapper" id="auth-container">
                </div>
            <div id="extra-links" class="system-shortcuts" style="display: none;">
                <a href="https://grouvex.github.io/" target="_blank" class="btn-shortcut">WebSite</a>
                <a href="https://grouvex.github.io/calendario-head" class="btn-shortcut">Calendario Staff</a>
                <a href="https://grouvex.github.io/calendario" class="btn-shortcut">Calendario GStudios</a>
            </div>
        </div>

        <footer class="system-footer">
            <div>STATUS: STABLE_CONNECTION</div>
            <div class="text-right">©2026 GROUVEX STUDIOS</div>
        </footer>
    </div>
</div>

<script>
    // --- LÓGICA DEL DRAGÓN ---
    const numSegments = 13;
    const segments = [];
    const coords = { x: 0, y: 0 };

    for (let i = 0; i < numSegments; i++) {
        const div = document.createElement('div');
        div.className = 'dragon-segment';
        const size = 20 - (i * 1.3);
        div.style.width = size + 'px';
        div.style.height = size + 'px';
        div.style.opacity = 1 - (i / numSegments);
        div.style.background = `radial-gradient(circle, hsl(${180 + (i*5)}, 100%, 50%) 0%, transparent 80%)`;
        document.body.appendChild(div);
        segments.push({ x: 0, y: 0, element: div });
    }

    window.addEventListener('mousemove', e => {
        coords.x = e.clientX;
        coords.y = e.clientY;
    });

    function updateDragon() {
        let x = coords.x;
        let y = coords.y;
        const head = document.querySelector('.dragon-head-shell');
        if (head) {
            head.style.left = x + 'px';
            head.style.top = y + 'px';
        }
        segments.forEach((seg) => {
            seg.x += (x - seg.x) * 0.22;
            seg.y += (y - seg.y) * 0.22;
            seg.element.style.left = seg.x + 'px';
            seg.element.style.top = seg.y + 'px';
            x = seg.x; y = seg.y;
        });
        requestAnimationFrame(updateDragon);
    }
    updateDragon();

    // --- LÓGICA DE FIREBASE Y SEGURIDAD ---
    const checkAuth = true;
    const authorizedEmails = [
    'tarlightetherall@gmail.com','tarlight.etherall@grouvex.com',
    'grouvex.phoenix@grouvex.com','grouvex@gmail.com',
    'grouvex.studio@gmail.com', 'grouvex.studios@grouvex.com',
    'gco.gstudios@gmail.com'
    ];

    const firebaseConfig = {
        apiKey: "AIzaSyAgoQ_Px3hHVrevUsyct_FBeXWMDKXpPSw",
        authDomain: "grouvex-studios.firebaseapp.com",
        databaseURL: "https://grouvex-studios-default-rtdb.firebaseio.com",
        projectId: "grouvex-studios",
        storageBucket: "grouvex-studios.appspot.com",
        messagingSenderId: "1070842606062",
        appId: "1:1070842606062:web:5d887863048fd100b49eff",
        measurementId: "G-75BR8D2CR3"
    };

    // Inicializar Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const container = document.getElementById('auth-container');
    const extraLinks = document.getElementById('extra-links');

    function showLoginUI() {
        extraLinks.style.display = 'none';
        container.innerHTML = `
            <div class="auth-card">
                <h3>ACCESS_REQUIRED</h3>
                <p>Identifícate para acceder al núcleo del calendario.</p>
                <div class="auth-methods">
                    <button onclick="loginGoogle()" class="btn-auth google">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> Google Login
                    </button>
                    <div class="divider-text"><span>OR EMAIL</span></div>
                    <input type="email" id="email" placeholder="Terminal ID">
                    <input type="password" id="pass" placeholder="Passcode">
                    <button onclick="loginEmail()" class="btn-auth primary">INITIATE_SESSION</button>
                </div>
            </div>`;
    }

    function showCalendar() {
        extraLinks.style.display = 'flex';
        container.innerHTML = `
            <div class="glass-reflection"></div>
            <iframe 
                src="https://calendar.google.com/calendar/embed?height=600&wkst=2&ctz=Europe%2FMadrid&showPrint=0&mode=MONTH&title=Calendario%20Oficial%20de%20Grouvex%20Studios%20Records&src=NDM1ODM5Y2M0M2E5YjkyMDlmNGJlYzkxMTQ0ZWQ4MjUwMTc3MGJhNTU1MjQ5ZTg3YzYwNzA3ZjYwZDgwNTFlZUBncm91cC5jYWxlbmRhci5nb29nbGUuY29t&color=%23f4511e" 
                class="google-iframe" 
                frameborder="0" 
                scrolling="no">
            </iframe>
            <button class="logout-mini" onclick="auth.signOut()">TERMINATE_SESSION</button>`;
    }

    // Funciones de Login
    window.loginGoogle = () => {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).catch(err => alert(err.message));
    };

    window.loginEmail = () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        auth.signInWithEmailAndPassword(email, pass).catch(err => alert("Fallo: " + err.message));
    };

    // Inicialización de Acceso
    function initializeAccess() {
        if (!checkAuth) {
            showCalendar();
            return;
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                if (authorizedEmails.includes(user.email)) {
                    showCalendar();
                } else {
                    extraLinks.style.display = 'none';
                    container.innerHTML = `
                        <div class="auth-card">
                            <h3 style="color:#ff5f57">UNAUTHORIZED</h3>
                            <p>El usuario <b>${user.email}</b> no tiene permisos.</p>
                            <button onclick="auth.signOut()" class="btn-auth primary">SWITCH_ACCOUNT</button>
                        </div>`;
                }
            } else {
                showLoginUI();
            }
        });
    }

    // Arrancar sistema
    initializeAccess();
</script>
</body>
</html>
