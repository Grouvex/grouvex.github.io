<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calendarios Oficiales - Grouvex Studios</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://raw.githubusercontent.com/Grouvex/grouvex.github.io/refs/heads/main/img/GROUVEX.png" type="image/x-icon">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
        :root {
            --accent: #00f2ff;
            --bg: #030508;
            --danger: #ff5f57;
            --warning: #febc2e;
            --staff: #ff4a4a;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); overflow: hidden; font-family: 'Segoe UI', monospace; color: white; cursor: crosshair; }

        .holographic-workspace { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        .neo-shell { 
            width: 95%; max-width: 1300px; height: 92%; 
            background: rgba(10, 14, 20, 0.98); 
            backdrop-filter: blur(20px); border: 1px solid rgba(0, 242, 255, 0.15); 
            border-radius: 20px; display: flex; flex-direction: column; 
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        .system-header { padding: 15px 25px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
        
        /* Estilos de los indicadores */
        .status-pill { font-size: 10px; padding: 4px 10px; border-radius: 20px; text-transform: uppercase; font-weight: bold; border: 1px solid; transition: all 0.3s ease; }
        .status-pill.public { color: var(--accent); border-color: var(--accent); }
        .status-pill.register { color: var(--warning); border-color: var(--warning); }
        .status-pill.private { color: var(--staff); border-color: var(--staff); box-shadow: 0 0 10px rgba(255, 74, 74, 0.2); }

        .main-content { flex: 1; display: flex; flex-direction: column; padding: 15px; gap: 10px; overflow: hidden; }
        
        #viewport { flex: 1; background: #000; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); position: relative; overflow: hidden; }
        #iframe-container { width: 100%; height: 100%; }
        iframe { width: 100%; height: 100%; border: none; }

        .nav-zone { display: flex; flex-direction: column; gap: 8px; width: 100%; }
        
        .row-wrapper {
            width: 100%;
            overflow-x: auto;
            white-space: nowrap;
            padding-bottom: 8px;
            display: flex;
            gap: 10px;
        }

        /* Scrollbar Estilizada */
        .row-wrapper::-webkit-scrollbar { height: 4px; }
        .row-wrapper::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
        .row-wrapper::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }

        .btn {
            display: inline-block;
            background: var(--glass); border: 1px solid rgba(0, 242, 255, 0.3);
            color: var(--accent); padding: 10px 20px; border-radius: 6px;
            font-size: 11px; font-weight: bold; cursor: pointer; transition: all 0.3s;
            text-transform: uppercase; letter-spacing: 1px; flex-shrink: 0;
        }
        
        .btn:hover { background: rgba(0, 242, 255, 0.15); border-color: var(--accent); }
        .btn.active { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent); }

        .auth-overlay { position: absolute; inset: 0; background: #05070a; display: flex; align-items: center; justify-content: center; z-index: 100; }
        .login-box { padding: 30px; border: 1px solid var(--accent); border-radius: 20px; background: rgba(0,0,0,0.8); text-align: center; width: 320px; }
        
        .auth-methods { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .auth-methods input { 
            background: rgba(255,255,255,0.05); border: 1px solid #333; 
            padding: 12px; color: white; border-radius: 5px; font-family: monospace; outline: none;
        }
        .auth-methods input:focus { border-color: var(--accent); }

        .btn-logout { background: rgba(255, 95, 87, 0.1); border: 1px solid var(--danger); color: var(--danger); font-size: 10px; padding: 6px 15px; border-radius: 0 0 10px 10px; cursor: pointer; font-weight: bold; align-self: center; transition: 0.3s; }
        .btn-logout:hover { background: var(--danger); color: white; }

        .dragon-segment { position: fixed; pointer-events: none; z-index: 9999; border-radius: 50%; transform: translate(-50%, -50%); }
    </style>
</head>
<body>

<div class="holographic-workspace">
    <div class="neo-shell">
        <header class="system-header">
            <div style="display: flex; align-items: center; gap: 15px;">
                <img src="https://raw.githubusercontent.com/Grouvex/grouvex.github.io/refs/heads/main/img/Grouvex1.png" height="35">
                <div>
                    <div style="font-size: 14px; font-weight: bold; color: var(--accent);">DRAKO_OS v7.8</div>
                    <div id="current-title" style="font-size: 10px; color: #666;">READY</div>
                </div>
            </div>
            <div class="status-pill public" id="access-indicator">PÚBLICO</div>
        </header>

        <main class="main-content">
            <div id="viewport">
                <div id="iframe-container"></div>
                
                <div id="auth-screen" class="auth-overlay" style="display: none;">
                    <div class="login-box">
                        <h3 style="color: var(--accent); margin: 0;">ACCESO RESTRINGIDO</h3>
                        <div class="auth-methods">
                            <button onclick="loginGoogle()" class="btn" style="background:white; color:black; border:none; width:100%">Google Login</button>
                            <div style="font-size: 10px; color: #444; margin: 5px 0;">O CREDENCIALES DIRECTAS</div>
                            <input type="email" id="email" placeholder="Terminal ID">
                            <input type="password" id="pass" placeholder="Passcode">
                            <button onclick="loginEmail()" class="btn" style="width:100%">Iniciar Sesión</button>
                        </div>
                    </div>
                </div>
            </div>

            <nav class="nav-zone">
                <div class="row-wrapper" id="main-nav">
                    <a href="https://grouvex.github.io/" target="_blank" style="text-decoration: none;">
                        <button class="btn" style="border-color: #fff; color: #fff;">Website_External</button>
                    </a>
                </div>
                <div class="row-wrapper" id="sub-nav" style="display: none; background: rgba(0, 242, 255, 0.05); padding: 10px; border-radius: 8px;"></div>
            </nav>

            <div id="logout-zone" style="display: none; display: flex; justify-content: center;">
                <button class="btn-logout" onclick="handleLogout()">TERMINATE_SESSION</button>
            </div>
        </main>
    </div>
</div>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyAgoQ_Px3hHVrevUsyct_FBeXWMDKXpPSw",
        authDomain: "grouvex-studios.firebaseapp.com",
        projectId: "grouvex-studios",
        appId: "1:1070842606062:web:5d887863048fd100b49eff"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // --- ESTRUCTURA DE DATOS ---
    const DATA = [
        {
            label: "1. Calendario Principal",
            url: "https://calendar.google.com/calendar/embed?src=249e7ac6e1075e491ac32995d932d1d84b9ddf5bf7e3c73431b668dec90b09e4%40group.calendar.google.com&ctz=UTC",
            private: false,
            allowed: [],
            subs: [
                {
                    label: "1.2 Calendario Social",
                    url: "https://calendar.google.com/calendar/embed?src=es.spain%23holiday%40group.v.calendar.google.com&ctz=UTC",
                    private: true,
                    allowed: ["register"] 
                }
            ]
        },
        {
            label: "2. GS Records",
            url: "https://calendar.google.com/calendar/embed?src=435839cc43a9b9209f4bec91144ed82501770ba555249e87c60707f60d8051ee%40group.calendar.google.com&ctz=UTC",
            private: true,
            allowed: ["register"], 
            subs: [
                { label: "Grouvex - Artista", url: "URL_A", private: true, allowed: ['tarlightetherall@gmail.com'] },
                { label: "Maiki Dran - Artista", url: "URL_B", private: true, allowed: ['tarlightetherall@gmail.com'] }
            ]
        }
    ];

    let userSession = null;
    let pendingConfig = null;

    function init() {
        const mainNav = document.getElementById('main-nav');
        DATA.forEach((cat, index) => {
            const b = document.createElement('button');
            b.className = 'btn';
            b.innerText = cat.label;
            b.onclick = () => selectMain(cat, b);
            mainNav.appendChild(b);
            if(index === 0) selectMain(cat, b);
        });

        auth.onAuthStateChanged(user => {
            userSession = user;
            document.getElementById('logout-zone').style.display = user ? 'flex' : 'none';
            if (user && pendingConfig) { 
                loadView(pendingConfig); 
                pendingConfig = null; 
            }
        });
    }

    function selectMain(cat, element) {
        document.querySelectorAll('#main-nav .btn').forEach(b => b.classList.remove('active'));
        element.classList.add('active');
        loadView(cat);
        renderSubs(cat);
    }

    function renderSubs(cat) {
        const subNav = document.getElementById('sub-nav');
        if (cat.subs && cat.subs.length > 0) {
            subNav.style.display = 'flex';
            subNav.innerHTML = '';
            cat.subs.forEach(sub => {
                const sb = document.createElement('button');
                sb.className = 'btn';
                sb.innerText = sub.label;
                sb.onclick = () => {
                    document.querySelectorAll('#sub-nav .btn').forEach(b => b.classList.remove('active'));
                    sb.classList.add('active');
                    loadView(sub);
                };
                subNav.appendChild(sb);
            });
        } else {
            subNav.style.display = 'none';
        }
    }

    function loadView(config) {
        const container = document.getElementById('iframe-container');
        const authScreen = document.getElementById('auth-screen');
        const title = document.getElementById('current-title');
        const indicator = document.getElementById('access-indicator');
        
        title.innerText = config.label;

        // --- LÓGICA DE INDICADOR ---
        if (!config.private) {
            indicator.innerText = "PÚBLICO";
            indicator.className = "status-pill public";
        } else if (config.allowed.includes("register")) {
            indicator.innerText = "REGISTRO";
            indicator.className = "status-pill register";
        } else {
            indicator.innerText = "PRIVADO";
            indicator.className = "status-pill private";
        }

        // --- LÓGICA DE ACCESO ---
        if (config.private) {
            if (!userSession) {
                pendingConfig = config;
                authScreen.style.display = 'flex';
                container.innerHTML = '';
                return;
            }
            
            const isAllowedAll = config.allowed.includes("register");
            const isAllowedSpecific = config.allowed.includes(userSession.email);

            if (!isAllowedAll && !isAllowedSpecific) {
                alert("ACCESO DENEGADO: Tu cuenta no tiene permisos para este nivel.");
                return;
            }
        }
        
        authScreen.style.display = 'none';
        container.innerHTML = `<iframe src="${config.url}"></iframe>`;
    }

    // --- AUTH ACTIONS ---
    window.loginGoogle = () => {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).catch(e => alert(e.message));
    };

    window.loginEmail = () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        auth.signInWithEmailAndPassword(email, pass).catch(e => alert("Error: " + e.message));
    };

    function handleLogout() { 
        auth.signOut().then(() => location.reload()); 
    }

    // --- DRAGON ANIMATION ---
    const segments = [];
    const mouse = { x: 0, y: 0 };
    for (let i = 0; i < 8; i++) {
        const d = document.createElement('div');
        d.className = 'dragon-segment';
        d.style.width = (10 - i) + 'px';
        d.style.height = (10 - i) + 'px';
        d.style.background = 'var(--accent)';
        d.style.opacity = (1 - i/8);
        document.body.appendChild(d);
        segments.push({ x: 0, y: 0, el: d });
    }
    window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
    function drag() {
        let x = mouse.x; let y = mouse.y;
        segments.forEach(s => {
            s.x += (x - s.x) * 0.3;
            s.y += (y - s.y) * 0.3;
            s.el.style.left = s.x + 'px';
            s.el.style.top = s.y + 'px';
            x = s.x; y = s.y;
        });
        requestAnimationFrame(drag);
    }

    init();
    drag();
</script>
</body>
</html>
