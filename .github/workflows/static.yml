# ============================================================================
# Workflow SEGURIDAD - Modo SOLO ADVERTENCIA
# IDENTIFICA vulnerabilidades pero NUNCA BLOQUEA el despliegue
# TODOS los jobs se ejecutan siempre
# ============================================================================

name: Deploy Static Site

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: "pages-${{ github.repository }}"
  cancel-in-progress: false

jobs:

  security-audit:
    name: 🔒 Auditoría de Seguridad (Solo advertencia)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      risk_level: ${{ steps.risk-assessment.outputs.level }}
      status: ${{ steps.final-security.outputs.status }}
      critical_count: ${{ steps.update-counters.outputs.critical }}
      high_count: ${{ steps.update-counters.outputs.high }}
      medium_count: ${{ steps.update-counters.outputs.medium }}
      low_count: ${{ steps.update-counters.outputs.low }}
    
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      # Inicializar contadores
      - name: 🎯 Inicializar contadores
        run: |
          echo "CRITICAL=0" >> $GITHUB_ENV
          echo "HIGH=0" >> $GITHUB_ENV
          echo "MEDIUM=0" >> $GITHUB_ENV
          echo "LOW=0" >> $GITHUB_ENV
      
      # ======================================================================
      # 1. ANÁLISIS DE SEGURIDAD EN HTML
      # ======================================================================
      - name: 🔍 Seguridad en HTML
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔍 ANÁLISIS DE SEGURIDAD - HTML"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          for file in $(find . -name "*.html"); do
            # 🔴 CRÍTICO: Recursos HTTP
            if grep -q 'src="http://' "$file" || grep -q 'href="http://' "$file"; then
              echo "🔴 [CRÍTICO] Recurso HTTP detectado en $file (debe ser HTTPS)"
              echo "CRITICAL=$((CRITICAL + 1))" >> $GITHUB_ENV
            fi
            
            # 🟠 ALTO: Falta CSP
            if ! grep -q 'Content-Security-Policy' "$file"; then
              echo "🟠 [ALTO] Falta CSP en $file (riesgo de XSS)"
              echo "HIGH=$((HIGH + 1))" >> $GITHUB_ENV
            fi
            
            # 🟡 MEDIO: Falta HSTS
            if ! grep -q 'Strict-Transport-Security' "$file"; then
              echo "🟡 [MEDIO] Falta HSTS en $file (riesgo de downgrade)"
              echo "MEDIUM=$((MEDIUM + 1))" >> $GITHUB_ENV
            fi
            
            # 🟡 MEDIO: Falta X-Frame-Options
            if ! grep -q 'X-Frame-Options' "$file"; then
              echo "🟡 [MEDIO] Falta protección clickjacking en $file"
              echo "MEDIUM=$((MEDIUM + 1))" >> $GITHUB_ENV
            fi
            
            # 🟢 BAJO: Falta X-Content-Type-Options
            if ! grep -q 'X-Content-Type-Options.*nosniff' "$file"; then
              echo "🟢 [BAJO] Falta X-Content-Type-Options en $file"
              echo "LOW=$((LOW + 1))" >> $GITHUB_ENV
            fi
          done
      
      # ======================================================================
      # 2. ANÁLISIS DE SEGURIDAD EN JAVASCRIPT
      # ======================================================================
      - name: 🔍 Seguridad en JavaScript
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔍 ANÁLISIS DE SEGURIDAD - JAVASCRIPT"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          for file in $(find . -name "*.js"); do
            filename=$(basename "$file")
            
            # Ignorar librerías legítimas
            if echo "$filename" | grep -qi "jquery\|firebase\|iframe_api\|player_api\|highlight"; then
              echo "  📦 Ignorando librería: $filename"
              continue
            fi
            
            echo ""
            echo "📜 Analizando: $file"
            
            # 🔴 CRÍTICO: eval()
            if grep -q "eval(" "$file"; then
              echo "  🔴 [CRÍTICO] eval() encontrado (ejecución de código arbitrario)"
              echo "CRITICAL=$((CRITICAL + 1))" >> $GITHUB_ENV
            fi
            
            # 🟠 ALTO: document.write
            if grep -q "document.write" "$file"; then
              echo "  🟠 [ALTO] document.write encontrado (peligroso)"
              echo "HIGH=$((HIGH + 1))" >> $GITHUB_ENV
            fi
            
            # 🟠 ALTO: innerHTML (XSS potencial)
            if grep -q "innerHTML" "$file"; then
              echo "  🟠 [ALTO] innerHTML encontrado (riesgo XSS)"
              echo "HIGH=$((HIGH + 1))" >> $GITHUB_ENV
            fi
            
            # 🔴 CRÍTICO: Secretos expuestos
            if grep -q "api_key\|apikey\|secret" "$file"; then
              echo "  🔴 [CRÍTICO] Posible secreto expuesto"
              echo "CRITICAL=$((CRITICAL + 1))" >> $GITHUB_ENV
            fi
            
            # 🟡 MEDIO: console.log
            if grep -q "console.log" "$file"; then
              echo "  🟡 [MEDIO] console.log en producción"
              echo "MEDIUM=$((MEDIUM + 1))" >> $GITHUB_ENV
            fi
            
            # 🟢 BAJO: debugger
            if grep -q "debugger" "$file"; then
              echo "  🟢 [BAJO] debugger encontrado"
              echo "LOW=$((LOW + 1))" >> $GITHUB_ENV
            fi
            
            # 🔴 CRÍTICO: Path traversal
            if grep -q "\.\./" "$file"; then
              echo "  🔴 [CRÍTICO] Path traversal detectado (../)"
              echo "CRITICAL=$((CRITICAL + 1))" >> $GITHUB_ENV
            fi
          done
      
      # ======================================================================
      # 3. ANÁLISIS DE SEGURIDAD EN CSS
      # ======================================================================
      - name: 🔍 Seguridad en CSS
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔍 ANÁLISIS DE SEGURIDAD - CSS"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          for file in $(find . -name "*.css"); do
            # 🔴 CRÍTICO: expression() CSS
            if grep -q "expression(" "$file"; then
              echo "🔴 [CRÍTICO] expression() CSS en $file (vulnerabilidad IE)"
              echo "CRITICAL=$((CRITICAL + 1))" >> $GITHUB_ENV
            fi
            
            # 🔴 CRÍTICO: behavior
            if grep -q "behavior:" "$file"; then
              echo "🔴 [CRÍTICO] behavior: en $file (vulnerabilidad)"
              echo "CRITICAL=$((CRITICAL + 1))" >> $GITHUB_ENV
            fi
            
            # 🟠 ALTO: @import HTTP
            if grep -q '@import.*http://' "$file"; then
              echo "🟠 [ALTO] @import HTTP en $file"
              echo "HIGH=$((HIGH + 1))" >> $GITHUB_ENV
            fi
          done
      
      # ======================================================================
      # 4. VERIFICACIÓN DE ARCHIVOS SENSIBLES
      # ======================================================================
      - name: 🔍 Archivos sensibles
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔍 VERIFICANDO ARCHIVOS SENSIBLES"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          # 🔴 CRÍTICO: Archivos de configuración sensibles
          for file in .env .env.local .env.production secrets.json .htpasswd; do
            if [ -f "$file" ]; then
              echo "🔴 [CRÍTICO] Archivo sensible expuesto: $file"
              echo "CRITICAL=$((CRITICAL + 1))" >> $GITHUB_ENV
            fi
          done
          
          # 🟡 MEDIO: Carpeta .git
          if [ -d ".git" ]; then
            echo "🟡 [MEDIO] Carpeta .git expuesta"
            echo "MEDIUM=$((MEDIUM + 1))" >> $GITHUB_ENV
          fi
          
          # 🟡 MEDIO: node_modules
          if [ -f "package.json" ] && [ -d "node_modules" ]; then
            echo "🟡 [MEDIO] node_modules expuesto"
            echo "MEDIUM=$((MEDIUM + 1))" >> $GITHUB_ENV
          fi
          
          # 🟢 BAJO: Archivos de backup
          for file in $(find . -name "*.bak" -o -name "*.backup" -o -name "*~" 2>/dev/null); do
            echo "🟢 [BAJO] Archivo backup: $file"
            echo "LOW=$((LOW + 1))" >> $GITHUB_ENV
          done
      
      # ======================================================================
      # 5. ESTRUCTURA HTML
      # ======================================================================
      - name: 📄 Validar estructura HTML
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📄 VALIDACIÓN DE ESTRUCTURA HTML"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          for file in $(find . -name "*.html"); do
            if ! grep -q "<!DOCTYPE html" "$file"; then
              echo "🟢 [BAJO] Fragment sin DOCTYPE: $file"
              echo "LOW=$((LOW + 1))" >> $GITHUB_ENV
            fi
            
            if ! grep -q "<body" "$file"; then
              echo "🟢 [BAJO] Sin <body> en $file"
              echo "LOW=$((LOW + 1))" >> $GITHUB_ENV
            fi
          done
      
      # ======================================================================
      # 6. ACTUALIZAR CONTADORES
      # ======================================================================
      - name: 📊 Actualizar contadores
        id: update-counters
        run: |
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT
          echo "medium=$MEDIUM" >> $GITHUB_OUTPUT
          echo "low=$LOW" >> $GITHUB_OUTPUT
      
      # ======================================================================
      # 7. EVALUACIÓN DE RIESGO
      # ======================================================================
      - name: 📊 Evaluación de riesgo
        id: risk-assessment
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 EVALUACIÓN DE RIESGO (SOLO INFORMATIVO)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "┌─────────────────────────────────────────────────────────────┐"
          echo "│                    REPORTE DE SEGURIDAD                     │"
          echo "├─────────────────────────────────────────────────────────────┤"
          echo "│ 🔴 CRÍTICOS: $CRITICAL                                          │"
          echo "│ 🟠 ALTOS:    $HIGH                                          │"
          echo "│ 🟡 MEDIOS:   $MEDIUM                                          │"
          echo "│ 🟢 BAJOS:    $LOW                                          │"
          echo "└─────────────────────────────────────────────────────────────┘"
          echo ""
          
          if [ "$CRITICAL" -gt 0 ]; then
            echo "level=critical" >> $GITHUB_OUTPUT
            echo "⚠️ Se encontraron $CRITICAL problemas CRÍTICOS (revisar ASAP)"
          elif [ "$HIGH" -gt 0 ]; then
            echo "level=high" >> $GITHUB_OUTPUT
            echo "⚠️ Se encontraron $HIGH problemas de ALTA gravedad"
          elif [ "$MEDIUM" -gt 0 ]; then
            echo "level=medium" >> $GITHUB_OUTPUT
            echo "ℹ️ Se encontraron $MEDIUM problemas de gravedad MEDIA"
          else
            echo "level=low" >> $GITHUB_OUTPUT
            echo "✅ Sitio con buenas prácticas de seguridad"
          fi
          
          echo ""
          echo "📌 NOTA: El despliegue CONTINUARÁ aunque haya problemas"
      
      # ======================================================================
      # 8. VALIDACIÓN FINAL - NUNCA BLOQUEA
      # ======================================================================
      - name: 🎯 Validación final
        id: final-security
        run: |
          echo "status=approved" >> $GITHUB_OUTPUT
          echo "✅ DESPLIEGUE APROBADO - Continuando con el despliegue"

  # ==========================================================================
  # OPTIMIZACIÓN - SIEMPRE SE EJECUTA
  # ==========================================================================
  optimize:
    name: ⚡ Optimizar
    runs-on: ubuntu-latest
    needs: security-audit
    # ✅ Eliminada la condición - siempre se ejecuta
    timeout-minutes: 5
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: 🗜️ Minificar (sin romper)
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "⚡ OPTIMIZANDO ARCHIVOS"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          for file in $(find . -name "*.js" ! -name "jquery*" ! -name "firebase*" ! -name "*.min.js"); do
            if ! grep -q "secret\|key\|token" "$file"; then
              sed -i 's/\/\/.*$//g; s/[[:space:]]\{2,\}/ /g' "$file" 2>/dev/null || true
              echo "✅ Minificado: $(basename "$file")"
            fi
          done
          echo ""
          echo "✅ Optimización completada"

  # ==========================================================================
  # DESPLIEGUE - SIEMPRE SE EJECUTA
  # ==========================================================================
  deploy:
    name: 🚀 Desplegar
    runs-on: ubuntu-latest
    needs: [security-audit, optimize]
    # ✅ Eliminada la condición - siempre se ejecuta
    timeout-minutes: 5
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: 🔧 Setup Pages
        uses: actions/configure-pages@v5
      
      - name: 📤 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          retention-days: 1
      
      - name: 🚀 Deploy
        id: deployment
        uses: actions/deploy-pages@v4
      
      - name: 📊 Reporte final
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════════╗"
          echo "║                    ✅ DESPLIEGUE COMPLETADO                       ║"
          echo "╚══════════════════════════════════════════════════════════════════╝"
          echo ""
          echo "📡 Sitio: ${{ steps.deployment.outputs.page_url }}"
          echo "📊 Nivel de riesgo detectado: ${{ needs.security-audit.outputs.risk_level }}"
          echo ""
          echo "📌 El despliegue se completó aunque se detectaron advertencias"
          echo "   Revisa el reporte de seguridad para más detalles"
