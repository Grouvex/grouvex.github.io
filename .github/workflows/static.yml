# ============================================================================
# Workflow SEGURIDAD - Modo Producción (CORREGIDO)
# SOLO BLOQUEA por vulnerabilidades CRÍTICAS
# Ignora librerías legítimas como jQuery, Firebase, YouTube API
# ============================================================================

name: Deploy Static Site

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: "pages-${{ github.repository }}"
  cancel-in-progress: false

jobs:

  security-audit:
    name: 🔒 Auditoría de Seguridad
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      status: ${{ steps.final-security.outputs.status }}
    
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      # ======================================================================
      # 1. SEGURIDAD HTML - SOLO CRÍTICO BLOQUEA
      # ======================================================================
      - name: 🔒 Seguridad en HTML
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔒 ANÁLISIS DE SEGURIDAD - HTML"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          CRITICAL_ERROR=0
          WARNINGS=0
          
          for file in $(find . -name "*.html"); do
            # BLOQUEANTE: Recursos HTTP
            if grep -q 'src="http://' "$file" || grep -q 'href="http://' "$file"; then
              echo "❌ BLOQUEADO: Recurso HTTP en $file (use HTTPS)"
              CRITICAL_ERROR=1
            fi
            
            # SOLO ADVERTENCIA: Falta CSP
            if ! grep -q 'Content-Security-Policy' "$file"; then
              echo "⚠️ ADVERTENCIA: Falta CSP en $file (recomendado)"
              WARNINGS=$((WARNINGS + 1))
            fi
          done
          
          echo ""
          echo "📊 Resumen HTML: $WARNINGS advertencias"
          if [ "$CRITICAL_ERROR" -eq 1 ]; then
            exit 1
          fi
      
      # ======================================================================
      # 2. SEGURIDAD JS - IGNORA LIBRERÍAS LEGÍTIMAS
      # ======================================================================
      - name: 🔒 Seguridad en JavaScript
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔒 ANÁLISIS DE SEGURIDAD - JAVASCRIPT"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          CRITICAL_ERROR=0
          WARNINGS=0
          
          # Lista de librerías legítimas que no se validan
          # Usamos un enfoque simple: excluir por nombre de archivo
          
          for file in $(find . -name "*.js"); do
            # Obtener solo el nombre del archivo (sin ruta)
            filename=$(basename "$file")
            
            # Ignorar librerías legítimas
            if echo "$filename" | grep -q "jquery"; then
              echo "  📦 Ignorando librería legítima: $filename"
              continue
            fi
            
            if echo "$filename" | grep -q "firebase"; then
              echo "  📦 Ignorando librería legítima: $filename"
              continue
            fi
            
            if echo "$filename" | grep -q "iframe_api"; then
              echo "  📦 Ignorando librería legítima: $filename"
              continue
            fi
            
            if echo "$filename" | grep -q "player_api"; then
              echo "  📦 Ignorando librería legítima: $filename"
              continue
            fi
            
            echo ""
            echo "📜 Analizando: $file"
            
            # BLOQUEANTE: eval()
            if grep -q "eval(" "$file"; then
              echo "  ❌ BLOQUEADO: eval() encontrado"
              CRITICAL_ERROR=1
            fi
            
            # BLOQUEANTE: document.write
            if grep -q "document.write" "$file"; then
              echo "  ❌ BLOQUEADO: document.write encontrado"
              CRITICAL_ERROR=1
            fi
            
            # BLOQUEANTE: Secretos expuestos
            if grep -q "api_key" "$file" || grep -q "apikey" "$file" || \
               grep -q "secret" "$file" || grep -q "token" "$file" || \
               grep -q "password" "$file"; then
              echo "  ❌ BLOQUEADO: Posible secreto expuesto"
              CRITICAL_ERROR=1
            fi
            
            # ADVERTENCIA: innerHTML
            if grep -q "innerHTML" "$file"; then
              echo "  ⚠️ ADVERTENCIA: innerHTML (riesgo XSS)"
              WARNINGS=$((WARNINGS + 1))
            fi
            
            # ADVERTENCIA: console.log
            if grep -q "console.log" "$file"; then
              echo "  ⚠️ ADVERTENCIA: console.log en producción"
              WARNINGS=$((WARNINGS + 1))
            fi
            
            # ADVERTENCIA: debugger
            if grep -q "debugger" "$file"; then
              echo "  ⚠️ ADVERTENCIA: debugger encontrado"
              WARNINGS=$((WARNINGS + 1))
            fi
          done
          
          echo ""
          echo "📊 Resumen JS: $WARNINGS advertencias"
          if [ "$CRITICAL_ERROR" -eq 1 ]; then
            exit 1
          fi
      
      # ======================================================================
      # 3. SEGURIDAD CSS - SOLO CRÍTICO BLOQUEA
      # ======================================================================
      - name: 🔒 Seguridad en CSS
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔒 ANÁLISIS DE SEGURIDAD - CSS"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          CRITICAL_ERROR=0
          
          for file in $(find . -name "*.css"); do
            if grep -q "expression(" "$file"; then
              echo "❌ BLOQUEADO: expression() CSS en $file"
              CRITICAL_ERROR=1
            fi
            
            if grep -q "behavior:" "$file"; then
              echo "❌ BLOQUEADO: behavior: en $file"
              CRITICAL_ERROR=1
            fi
          done
          
          if [ "$CRITICAL_ERROR" -eq 1 ]; then
            exit 1
          fi
      
      # ======================================================================
      # 4. ARCHIVOS SENSIBLES - BLOQUEA
      # ======================================================================
      - name: 🔒 Archivos sensibles
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔒 VERIFICANDO ARCHIVOS SENSIBLES"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          for file in .env .env.local .env.production secrets.json .htpasswd; do
            if [ -f "$file" ]; then
              echo "❌ BLOQUEADO: Archivo sensible: $file"
              exit 1
            fi
          done
          
          # Advertencias
          if [ -d ".git" ]; then
            echo "⚠️ ADVERTENCIA: Carpeta .git expuesta"
          fi
      
      # ======================================================================
      # 5. ESTRUCTURA HTML - SOLO ADVERTENCIA
      # ======================================================================
      - name: 📄 Validar estructura (solo advertencia)
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📄 VALIDACIÓN DE ESTRUCTURA (No bloquea)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          for file in $(find . -name "*.html"); do
            if ! grep -q "<!DOCTYPE html" "$file"; then
              echo "🧩 Fragment (sin DOCTYPE): $file"
            fi
            
            if ! grep -q "<body" "$file"; then
              echo "⚠️ ADVERTENCIA: Sin <body> en $file (no bloquea)"
            fi
          done
      
      # ======================================================================
      # 6. EVALUACIÓN FINAL
      # ======================================================================
      - name: 📊 Evaluación final
        id: final-security
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 EVALUACIÓN FINAL"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "✅ No se encontraron errores críticos"
          echo "✅ DESPLIEGUE APROBADO"
          
          echo "status=approved" >> $GITHUB_OUTPUT

  # ==========================================================================
  # OPTIMIZACIÓN
  # ==========================================================================
  optimize:
    name: ⚡ Optimizar
    runs-on: ubuntu-latest
    needs: security-audit
    if: needs.security-audit.outputs.status == 'approved'
    timeout-minutes: 5
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: 🗜️ Minificar JS (excluyendo librerías)
        run: |
          for file in $(find . -name "*.js" ! -name "jquery*" ! -name "firebase*" ! -name "*.min.js"); do
            if ! grep -q "secret\|key\|token" "$file"; then
              sed -i 's/\/\/.*$//g; s/[[:space:]]\{2,\}/ /g' "$file" 2>/dev/null || true
              echo "✅ Minificado: $(basename "$file")"
            fi
          done

  # ==========================================================================
  # DESPLIEGUE
  # ==========================================================================
  deploy:
    name: 🚀 Desplegar
    runs-on: ubuntu-latest
    needs: [security-audit, optimize]
    if: needs.security-audit.outputs.status == 'approved'
    timeout-minutes: 5
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: 🔧 Setup Pages
        uses: actions/configure-pages@v5
      
      - name: 📤 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          retention-days: 1
      
      - name: 🚀 Deploy
        id: deployment
        uses: actions/deploy-pages@v4
      
      - name: 📊 Reporte
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║              ✅ DESPLIEGUE COMPLETADO                        ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
          echo "📡 Sitio: ${{ steps.deployment.outputs.page_url }}"
