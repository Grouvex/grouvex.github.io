<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Anuncio - Grouvex Studios</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="index, follow">
    
    <meta property="og:title" content="Grouvex Studios - Anuncio">
    <meta property="og:type" content="article">
    <meta property="og:site_name" content="Grouvex Studios">
    
    <link rel="icon" href="img/GROUVEX.png" type="image/x-icon">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="temas.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/2.4.0/purify.min.js" integrity="sha512-uH9S9POfu5uD99+nnoB0msh7n9L21v1Jt00fH8U8p0Wv46v2Bf2C901614f16b251216b24021234567890abcdef" crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <style>
        :root {
            --color-primary: #63eb25;
            --color-dark: #1a1a2e;
            --border-radius: 12px;
        }
        
        body {
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .anuncio-container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 2rem;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: var(--border-radius);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .anuncio-header {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding-bottom: 1.5rem;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid var(--color-primary);
        }
        
        .user-avatar-large {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--color-primary);
        }
        
        .anuncio-title {
            color: white;
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        
        .anuncio-content {
            color: rgba(255,255,255,0.9);
            line-height: 1.8;
        }
        
        .anuncio-content img {
            max-width: 100%;
            border-radius: 8px;
        }
        
        .anuncio-content iframe {
            max-width: 100%;
            border-radius: 8px;
            margin: 1rem 0;
        }
        
        .back-button {
            display: inline-block;
            margin-top: 2rem;
            padding: 0.8rem 1.5rem;
            background: linear-gradient(135deg, var(--color-primary), #17cb80);
            color: var(--color-dark);
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: transform 0.3s ease;
        }
        
        .back-button:hover {
            transform: translateY(-2px);
        }
        
        .not-found {
            text-align: center;
            color: white;
            padding: 3rem;
        }
    </style>
</head>
<body>
    <header>
        <a href="https://grouvex.github.io/">
            <div class="img-container" loading="lazy"></div>
        </a>
        <nav>
            <span id="menuG"></span>
            <span id="menuT"></span>
            <span id="menuU"></span>
        </nav>
    </header>
    
    <main>
        <div id="anuncioContent" class="anuncio-container">
            <!-- Contenido dinámico -->
        </div>
    </main>
    
    <div id="footer"></div>
    
    <script>
        function sanitizeHTML(str) {
            if (!str) return '';
            return DOMPurify.sanitize(str, {
                ALLOWED_TAGS: ['p', 'br', 'strong', 'em', 'ul', 'li', 'a', 'h1', 'h2', 'h3', 'h4', 'article', 'div', 'span', 'iframe', 'hr', 'img', 'n'],
                ALLOWED_ATTR: ['href', 'target', 'src', 'frameborder', 'allow', 'class', 'id', 'style', 'alt', 'width', 'height']
            });
        }
        
        function getUrlParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }
        
        async function loadAnnouncement() {
            const id = getUrlParam('id');
            const container = document.getElementById('anuncioContent');
            
            if (!id) {
                container.innerHTML = '<div class="not-found"><h2>❌ No se especificó ningún anuncio</h2><a href="anuncios" class="back-button">← Volver a anuncios</a></div>';
                return;
            }
            
            try {
                const response = await fetch('anuncios.json');
                if (!response.ok) throw new Error('Error al cargar datos');
                const anuncios = await response.json();
                const anuncio = anuncios.find(a => a.id === id);
                
                if (!anuncio) {
                    container.innerHTML = '<div class="not-found"><h2>🔍 Anuncio no encontrado</h2><p>El anuncio que buscas no existe o ha sido eliminado.</p><a href="anuncios" class="back-button">← Volver a anuncios</a></div>';
                    return;
                }
                
                document.title = `${anuncio.titulo} - Grouvex Studios`;
                
                container.innerHTML = `
                    <div class="anuncio-header">
                        <img src="${sanitizeHTML(anuncio.userimagen)}" alt="${sanitizeHTML(anuncio.user)}" class="user-avatar-large" onerror="this.src='img/default-avatar.png'">
                        <div>
                            <div style="color: var(--color-primary); margin-bottom: 0.5rem;">📌 ${sanitizeHTML(anuncio.tipo)}</div>
                            <div style="color: rgba(255,255,255,0.6);">👤 ${sanitizeHTML(anuncio.user)}</div>
                        </div>
                    </div>
                    <h1 class="anuncio-title">${sanitizeHTML(anuncio.titulo)}</h1>
                    <div class="anuncio-content">
                        ${sanitizeHTML(anuncio.contenido)}
                        ${anuncio.infoAdicional ? `<hr style="margin: 1.5rem 0; border-color: rgba(255,255,255,0.2);">${sanitizeHTML(anuncio.infoAdicional)}` : ''}
                    </div>
                    <a href="anuncios" class="back-button">← Volver a la lista de anuncios</a>
                `;
            } catch (error) {
                console.error('Error:', error);
                container.innerHTML = '<div class="not-found"><h2>⚠️ Error al cargar el anuncio</h2><p>Por favor, intenta de nuevo más tarde.</p><a href="anuncios" class="back-button">← Volver a anuncios</a></div>';
            }
        }
        
        // Inicialización
        document.addEventListener('DOMContentLoaded', () => {
            loadAnnouncement();
            $("#menuG").load("menuG.html");
            $("#menuT").load("menuT.html");
            $("#menuU").load("menuU.html");
            $("#footer").load("footer.html");
        });
    </script>
</body>
</html>
