# ============================================================================
# Workflow SEGURIDAD - Modo Producción
# SOLO BLOQUEA por vulnerabilidades CRÍTICAS
# Todo lo demás solo advierte
# ============================================================================

name: Deploy Static Site

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: "pages-${{ github.repository }}"
  cancel-in-progress: false

jobs:

  security-audit:
    name: 🔒 Auditoría de Seguridad
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      status: ${{ steps.final-security.outputs.status }}
    
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      # ======================================================================
      # 1. SEGURIDAD HTML - SOLO CRÍTICO BLOQUEA
      # ======================================================================
      - name: 🔒 Seguridad en HTML
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔒 ANÁLISIS DE SEGURIDAD - HTML"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          CRITICAL_ERROR=0
          WARNINGS=0
          
          find . -name "*.html" | while read file; do
            # === BLOQUEANTE: Recursos HTTP (inseguro) ===
            if grep -q 'src="http://' "$file" || grep -q 'href="http://' "$file"; then
              echo "❌ BLOQUEADO: Recurso HTTP en $file (use HTTPS)"
              CRITICAL_ERROR=1
            fi
            
            # === SOLO ADVERTENCIA: Falta CSP ===
            if ! grep -q 'Content-Security-Policy' "$file"; then
              echo "⚠️ ADVERTENCIA: Falta CSP en $file (recomendado)"
              WARNINGS=$((WARNINGS + 1))
            fi
            
            # === SOLO ADVERTENCIA: Headers de seguridad ===
            if ! grep -q 'X-Frame-Options' "$file"; then
              echo "⚠️ ADVERTENCIA: Falta protección clickjacking en $file"
            fi
          done
          
          echo ""
          echo "📊 Resumen HTML: $WARNINGS advertencias"
          if [ "$CRITICAL_ERROR" -eq 1 ]; then
            exit 1
          fi
      
      # ======================================================================
      # 2. SEGURIDAD JS - SOLO CRÍTICO BLOQUEA
      # ======================================================================
      - name: 🔒 Seguridad en JavaScript
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔒 ANÁLISIS DE SEGURIDAD - JAVASCRIPT"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          CRITICAL_ERROR=0
          WARNINGS=0
          
          find . -name "*.js" | while read file; do
            # === BLOQUEANTE: eval() ===
            if grep -q 'eval(' "$file"; then
              echo "❌ BLOQUEADO: eval() en $file (ejecución arbitraria)"
              CRITICAL_ERROR=1
            fi
            
            # === BLOQUEANTE: document.write ===
            if grep -q 'document.write' "$file"; then
              echo "❌ BLOQUEADO: document.write en $file (peligroso)"
              CRITICAL_ERROR=1
            fi
            
            # === BLOQUEANTE: Secretos expuestos ===
            if grep -qE '(api_key|apikey|secret|token|password) *= *["\']([^"\']{8,})["\']' "$file"; then
              echo "❌ BLOQUEADO: Posible secreto expuesto en $file"
              CRITICAL_ERROR=1
            fi
            
            # === SOLO ADVERTENCIA: innerHTML (XSS potencial) ===
            if grep -q 'innerHTML' "$file"; then
              echo "⚠️ ADVERTENCIA: innerHTML en $file (riesgo XSS)"
              WARNINGS=$((WARNINGS + 1))
            fi
            
            # === SOLO ADVERTENCIA: console.log ===
            if grep -q 'console\.log' "$file"; then
              echo "⚠️ ADVERTENCIA: console.log en $file (producción)"
              WARNINGS=$((WARNINGS + 1))
            fi
            
            # === SOLO ADVERTENCIA: debugger ===
            if grep -q 'debugger' "$file"; then
              echo "⚠️ ADVERTENCIA: debugger en $file"
              WARNINGS=$((WARNINGS + 1))
            fi
          done
          
          echo ""
          echo "📊 Resumen JS: $WARNINGS advertencias"
          if [ "$CRITICAL_ERROR" -eq 1 ]; then
            exit 1
          fi
      
      # ======================================================================
      # 3. SEGURIDAD CSS - SOLO CRÍTICO BLOQUEA
      # ======================================================================
      - name: 🔒 Seguridad en CSS
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔒 ANÁLISIS DE SEGURIDAD - CSS"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          CRITICAL_ERROR=0
          
          find . -name "*.css" | while read file; do
            # === BLOQUEANTE: expression() ===
            if grep -q 'expression(' "$file"; then
              echo "❌ BLOQUEADO: expression() CSS en $file (vulnerabilidad IE)"
              CRITICAL_ERROR=1
            fi
            
            # === BLOQUEANTE: behavior ===
            if grep -q 'behavior:' "$file"; then
              echo "❌ BLOQUEADO: behavior: en $file (vulnerabilidad)"
              CRITICAL_ERROR=1
            fi
            
            # === BLOQUEANTE: @import HTTP ===
            if grep -q '@import.*http://' "$file"; then
              echo "❌ BLOQUEADO: @import HTTP en $file"
              CRITICAL_ERROR=1
            fi
          done
          
          if [ "$CRITICAL_ERROR" -eq 1 ]; then
            exit 1
          fi
      
      # ======================================================================
      # 4. ARCHIVOS SENSIBLES - BLOQUEA
      # ======================================================================
      - name: 🔒 Archivos sensibles
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔒 VERIFICANDO ARCHIVOS SENSIBLES"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          # Bloques críticos
          for file in .env .env.local .env.production config.json secrets.json .htpasswd; do
            if [ -f "$file" ]; then
              echo "❌ BLOQUEADO: Archivo sensible expuesto: $file"
              exit 1
            fi
          done
          
          # Advertencias (no bloquean)
          if [ -d ".git" ]; then
            echo "⚠️ ADVERTENCIA: Carpeta .git expuesta"
          fi
          
          if [ -f "package.json" ] && [ -d "node_modules" ]; then
            echo "⚠️ ADVERTENCIA: node_modules expuesto"
          fi
          
          # Archivos de backup (advertencia)
          find . -name "*.bak" -o -name "*.backup" -o -name "*~" | while read file; do
            echo "⚠️ ADVERTENCIA: Archivo backup: $file"
          done
      
      # ======================================================================
      # 5. ESTRUCTURA HTML - SOLO ADVERTENCIA (NO BLOQUEA)
      # ======================================================================
      - name: 📄 Validar estructura HTML (solo advertencia)
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📄 VALIDACIÓN DE ESTRUCTURA (Solo advertencia)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          find . -name "*.html" | while read file; do
            # Detectar si es fragment o página completa
            if grep -q "<!DOCTYPE html" "$file" 2>/dev/null; then
              # Es página completa, verificar estructura
              if ! grep -q "<body" "$file"; then
                echo "⚠️ ADVERTENCIA: Falta <body> en página completa $file (no bloquea)"
              fi
            else
              # Es fragment, no validamos estructura
              echo "🧩 Fragment detectado: $file (estructura flexible)"
            fi
          done
      
      # ======================================================================
      # 6. EVALUACIÓN FINAL
      # ======================================================================
      - name: 📊 Evaluación final
        id: risk-assessment
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 EVALUACIÓN FINAL"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "✅ No se encontraron errores críticos de seguridad"
          echo "⚠️ Las advertencias no bloquean el despliegue"
      
      - name: 🎯 Validación final
        id: final-security
        run: |
          echo "status=approved" >> $GITHUB_OUTPUT
          echo "✅ DESPLIEGUE APROBADO"

  # ==========================================================================
  # JOB 2: OPTIMIZACIÓN (opcional)
  # ==========================================================================
  optimize:
    name: ⚡ Optimizar (opcional)
    runs-on: ubuntu-latest
    needs: security-audit
    if: needs.security-audit.outputs.status == 'approved'
    timeout-minutes: 5
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: 🗜️ Minificar (sin romper)
        run: |
          find . -name "*.js" ! -name "*.min.js" | while read file; do
            if ! grep -q 'secret\|key\|token' "$file"; then
              sed -i 's/\/\/.*$//g; s/[[:space:]]\{2,\}/ /g' "$file" 2>/dev/null || true
            fi
          done
          echo "✅ Optimización completada"

  # ==========================================================================
  # JOB 3: DESPLIEGUE
  # ==========================================================================
  deploy:
    name: 🚀 Desplegar
    runs-on: ubuntu-latest
    needs: [security-audit, optimize]
    if: needs.security-audit.outputs.status == 'approved'
    timeout-minutes: 5
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: 🔧 Setup Pages
        uses: actions/configure-pages@v5
      
      - name: 📤 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          retention-days: 1
      
      - name: 🚀 Deploy
        id: deployment
        uses: actions/deploy-pages@v4
      
      - name: 📊 Reporte
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║              ✅ DESPLIEGUE COMPLETADO                        ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
          echo "📡 Sitio: ${{ steps.deployment.outputs.page_url }}"
          echo "⚠️ Nota: Las advertencias de seguridad no bloquearon el deploy"
