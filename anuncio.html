<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Anuncio - Grouvex Studios</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="img/GROUVEX.png" type="image/x-icon">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="temas.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/2.4.0/purify.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.6.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.6.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.6.1/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/2.4.0/purify.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        :root {
            --color-primary: #63eb25;
            --color-dark: #1a1a2e;
            --border-radius: 12px;
        }
        
        body {
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .anuncio-container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 2rem;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: var(--border-radius);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .anuncio-header {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding-bottom: 1.5rem;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid var(--color-primary);
        }
        
        .user-avatar-large {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--color-primary);
        }
        
        .anuncio-title {
            color: white;
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        
        .anuncio-content {
            color: rgba(255,255,255,0.9);
            line-height: 1.8;
        }
        
        .back-button {
            display: inline-block;
            margin-top: 2rem;
            padding: 0.8rem 1.5rem;
            background: linear-gradient(135deg, var(--color-primary), #17cb80);
            color: var(--color-dark);
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: transform 0.3s ease;
        }
        
        .back-button:hover {
            transform: translateY(-2px);
        }
        
        .not-found {
            text-align: center;
            color: white;
            padding: 3rem;
        }
    </style>
</head>
<body>
    <header>
        <a href="https://grouvex.github.io/">
            <div class="img-container" loading="lazy"></div>
        </a>
        <nav>
            <span id="menuG"></span>
            <span id="menuT"></span>
            <span id="menuU"></span>
        </nav>
    </header>
    
    <main>
        <div id="anuncioContent" class="anuncio-container">
            <div style="color:white; text-align:center;">Cargando anuncio...</div>
        </div>
    </main>
    
    <div id="footer"></div>
    
    <script>
        function sanitizeHTML(str) {
            if (!str) return '';
            return DOMPurify.sanitize(str);
        }
        
        function getUrlParam(param) {
            return new URLSearchParams(window.location.search).get(param);
        }
        
        async function loadAnnouncement() {
            const id = getUrlParam('id');
            const container = document.getElementById('anuncioContent');
            
            if (!id) {
                container.innerHTML = '<div class="not-found"><h2>❌ No se especificó ningún anuncio</h2><a href="anuncios" class="back-button">← Volver</a></div>';
                return;
            }
            
            try {
                const response = await fetch('anuncios.json');
                if (!response.ok) throw new Error();
                const anuncios = await response.json();
                const anuncio = anuncios.find(a => a.id === id);
                
                if (!anuncio) {
                    container.innerHTML = '<div class="not-found"><h2>🔍 Anuncio no encontrado</h2><a href="anuncios" class="back-button">← Volver</a></div>';
                    return;
                }
                
                document.title = `${anuncio.titulo} - Grouvex Studios`;
                
                container.innerHTML = `
                    <div class="anuncio-header">
                        <img src="${sanitizeHTML(anuncio.userimagen)}" alt="${sanitizeHTML(anuncio.user)}" class="user-avatar-large" onerror="this.src='img/default-avatar.png'">
                        <div>
                            <div style="color: var(--color-primary);">📌 ${sanitizeHTML(anuncio.tipo)}</div>
                            <div style="color: rgba(255,255,255,0.6);">
                                👤 <span tigsID="${sanitizeHTML(anuncio.userID)}"></span>
                                <span class="insignias-container"></span>
                            </div>
                        </div>
                    </div>
                    <h1 class="anuncio-title">${sanitizeHTML(anuncio.titulo)}</h1>
                    <div class="anuncio-content">
                        ${sanitizeHTML(anuncio.contenido)}
                        ${anuncio.infoAdicional ? `<hr><br>${sanitizeHTML(anuncio.infoAdicional)}` : ''}
                    </div>
                    <a href="anuncios" class="back-button">← Volver a anuncios</a>
                `;
                if (typeof window.cargarDatosEInsigniasEnTodosLosElementos === 'function') {
                    window.cargarDatosEInsigniasEnTodosLosElementos();
                }
            } catch (error) {
                container.innerHTML = '<div class="not-found"><h2>⚠️ Error al cargar</h2><a href="anuncios" class="back-button">← Volver</a></div>';
            }
        }
        
        // Cargar menús y footer
        $(document).ready(function() {
            $("#menuG").load("menuG.html");
            $("#menuT").load("menuT.html");
            $("#menuU").load("menuU.html");
            $("#footer").load("footer.html");
            loadAnnouncement();
        });
    </script>
    <script src="time.js"></script></script><script type="module" src="abc.js"></script><script src="index.js"></script>
</body>
</html>
